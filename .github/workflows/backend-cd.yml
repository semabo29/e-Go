name: Deploy Backend to AWS Lambda

on:
  push:
    branches:
      - development
    paths:
      - "backend/**"
      - ".github/workflows/backend-cd.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # El backend vive en ./backend (no hay package.json en la raíz del repo).
      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Lambda: handler index.handler. El zip debe incluir TODO lo que require() carga en runtime.
      # Antes faltaban controllers, models, services y middleware → la función fallaba al arrancar.
      - name: Create Zip Bundle
        working-directory: backend
        run: |
          set -euo pipefail
          node scripts/build-lambda-zip.js
          cp lambda_deploy.zip deploy.zip
          ls -lh deploy.zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy to AWS Lambda (AWS CLI)
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name backend-ego-api \
            --zip-file fileb://backend/deploy.zip \
            --region eu-north-1
          aws lambda wait function-updated \
            --function-name backend-ego-api \
            --region eu-north-1
