name: SonarQube Analysis

on:
  push:
    branches: ["development", "sonarqube1", "main"]
  pull_request:
    branches: ["development", "sonarqube1", "main"]
  workflow_dispatch:

jobs:
  sonarqube:
    name: Analitzar amb SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Rutes definides a sonar-project.properties; sense això el scanner pot fallar si no hi ha LCOV reals.
      - name: LCOV buits (sense cobertura d'aquest workflow)
        run: |
          mkdir -p backend/coverage frontend/coverage/jest frontend/coverage/vitest
          for p in backend/coverage/lcov.info frontend/coverage/jest/lcov.info frontend/coverage/vitest/lcov.info; do
            printf '%s\n' 'TN:' 'SF:backend/index.js' 'end_of_record' > "$p"
          done

      - name: Anàlisi amb SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: .
