name: Coverage

# Genera la cobertura de tests del backend i del frontend
# i la puja com a artifacts perquè altres workflows la puguin reutilitzar.
on:
  push:
    branches: ["development", "sonarqube1", "main"]
  pull_request:
    branches: ["development", "sonarqube1", "main"]

jobs:
  # =====================================================
  # BACKEND
  # =====================================================
  backend-coverage:
    name: Backend - Tests amb cobertura
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json"

      - name: Instal·lar dependències
        working-directory: ./backend
        run: npm ci

      - name: Crear taules a la BD
        env:
          PGPASSWORD: test_password
        run: |
          for f in ./backend/sql/*.sql; do
            echo "Executant script: $f"
            psql -h localhost -U test_user -d test_db -f "$f"
          done

      - name: Tests amb cobertura (Jest)
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          DB_SCHEMA: ego
          DB_TABLE_USUARIOS: usuarios
          GOOGLE_CLIENT_ID: test_client_id
          GOOGLE_CLIENT_SECRET: test_client_secret
          PENDING_SECRET: test_pending_secret
        run: npx jest --runInBand --coverage

      - name: Pujar artifact de cobertura backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          retention-days: 1

  # =====================================================
  # FRONTEND
  # =====================================================
  frontend-coverage:
    name: Frontend - Tests amb cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Instal·lar dependències
        working-directory: ./frontend
        run: npm ci

      - name: Tests amb cobertura (Vitest)
        working-directory: ./frontend
        env:
          CI: true
        run: npx vitest run --coverage

      - name: Tests amb cobertura (Jest)
        working-directory: ./frontend
        env:
          CI: true
        run: npx jest --runInBand --coverage

      - name: Pujar artifacts de cobertura frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/vitest/lcov.info
            frontend/coverage/jest/lcov.info
          retention-days: 1
          if-no-files-found: warn
