name: Frontend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "frontend/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "frontend/**"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Instal·lar dependències
        working-directory: ./frontend
        run: npm ci

      - name: Comprovar l'estil (Linting)
        working-directory: ./frontend
        # Executa l'script de l'expo lint que teniu al vostre package.json
        run: npm run lint

      - name: Comprovar tipus (TypeScript)
        working-directory: ./frontend
        # Revisa tot el codi TypeScript sense compilar res (--noEmit) buscant errors
        run: npx tsc --noEmit
