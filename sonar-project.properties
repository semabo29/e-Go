####################################################################
# Configuració de SonarCloud / SonarQube per al projecte e-Go
#
# IMPORTANT: heu d'editar 'sonar.projectKey' i 'sonar.organization'
# amb els valors que us doni SonarCloud quan creeu el projecte.
####################################################################

# ----- Identificació del projecte -----
sonar.projectKey=pes2526q2-21-gei-upc_e-go
sonar.organization=pes2526q2-21-gei-upc
sonar.projectName=e-Go
sonar.projectVersion=1.0

# ----- Codi font a analitzar -----
# Analitzem tant el backend (Node.js) com el frontend (React Native/Expo)
sonar.sources=backend,frontend

# ----- Tests -----
sonar.tests=backend/tests,frontend/tests
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/tests/**/*

# ----- Codificació i llenguatges -----
sonar.sourceEncoding=UTF-8

# ----- Cobertura de tests (format LCOV) -----
# Es generen amb `jest --coverage` / `vitest run --coverage`.
# El frontend genera dos reports (Jest i Vitest), cadascun a la seva subcarpeta.
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/jest/lcov.info,frontend/coverage/vitest/lcov.info
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/jest/lcov.info,frontend/coverage/vitest/lcov.info

# ----- Exclusions globals -----
# Fitxers que NO s'han d'analitzar (dependències, builds, coverage, etc.)
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/.expo/**,\
  **/android/**,\
  **/ios/**,\
  **/public/**,\
  **/scripts/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/*.config.cjs,\
  **/jest.setup.ts,\
  frontend/keystores/**,\
  backend/sql/**,\
  backend/backend-ego.zip

# ----- Exclusions de cobertura -----
# Fitxers que SI s'analitzen però NO compten per a la cobertura
sonar.coverage.exclusions=\
  **/tests/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/jest.setup.ts,\
  **/*.config.js,\
  **/*.config.ts,\
  frontend/app/_layout.tsx,\
  backend/index.js,\
  backend/index.jsx
