####################################################################
# Configuració de SonarCloud / SonarQube per al projecte e-Go
#
# IMPORTANT: heu d'editar 'sonar.projectKey' i 'sonar.organization'
# amb els valors que us doni SonarCloud quan creeu el projecte.
####################################################################

# ----- Identificació del projecte -----
sonar.projectKey=semabo29_e-Go
sonar.organization=semabo29
sonar.projectName=e-Go
sonar.projectVersion=1.0

# ----- Codi font a analitzar -----
# Analitzem tant el backend (Node.js) com el frontend (React Native/Expo)
sonar.sources=backend,frontend

# ----- Tests -----
sonar.tests=backend/tests,frontend/tests
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/tests/**/*

# ----- Codificació i llenguatges -----
sonar.sourceEncoding=UTF-8

# ----- Cobertura -----
# La cobertura es valida al workflow "Coverage" (Jest/Vitest + lcov).
# Sonar només fa anàlisi estàtic; no importem LCOV ni mesurem % aquí (plan free + Sonar way).

# ----- Exclusions globals -----
# Fitxers que NO s'han d'analitzar (dependències, builds, coverage, etc.)
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/.expo/**,\
  **/android/**,\
  **/ios/**,\
  **/public/**,\
  **/scripts/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/*.config.cjs,\
  **/jest.setup.ts,\
  frontend/keystores/**,\
  backend/sql/**,\
  backend/backend-ego.zip

# ----- Exclusions de cobertura (Sonar) -----
# Tot el codi font queda fora de la mètrica de cobertura de SonarCloud.
sonar.coverage.exclusions=**/*

# ----- Duplicació (CPD) -----
# Fitxers de traducció: mateixa estructura de claus, textos diferents per idioma.
sonar.cpd.exclusions=**/i18n/locales/**
